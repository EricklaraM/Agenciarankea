baseURL = "https://agenciarankea.cl/"
languageCode = "es-CL"
title = "Agencia Rankea | Tiendas online, SEO ecommerce y automatización en Chile"
enableRobotsTXT = true
enableGitInfo    = false

[pagination]
  pagerSize = 6

[build]
  writeStats = true

[minify]
  disableCSS   = false
  disableHTML  = false
  disableJS    = false
  disableJSON  = false
  disableSVG   = false
  disableXML   = false
  minifyOutput = true

[outputs]
  home    = ["HTML", "RSS"]
  page    = ["HTML"]
  section = ["HTML", "RSS"]

[params]
  description  = "Agencia ecommerce en Chile para pymes: creamos, posicionamos y automatizamos tiendas online en WooCommerce. Más visitas, más conversión y más ventas."
  keywords     = "agencia ecommerce chile, tiendas online woocommerce, seo ecommerce chile, automatizacion ventas, desarrollo tienda online chile, pymes ecommerce"
  author       = "Agencia Rankea"
  email        = "hola@agenciarankea.cl"
  phone        = "+56 9 XXXX XXXX"
  address      = "Santiago, Chile"
  formspreeID  = "YOUR_FORMSPREE_ID"            # ← reemplazar
  gtmID        = ""                              # ← opcional: GTM-XXXXXXX

  # CTA global
  ctaText = "Cotiza tu tienda"
  ctaURL  = "/contacto"

  # Hero
  heroTitle    = "Rankea más alto.\nVende más."
  heroSubtitle = "Creamos, posicionamos y automatizamos tiendas online para pymes chilenas. Más visitas, más conversión y más ventas."

  # Social
  [params.social]
    instagram = "https://instagram.com/agenciarankea"
    linkedin  = "https://linkedin.com/company/agenciarankea"
    whatsapp  = "https://wa.me/569XXXXXXXX"

[menu]
  [[menu.main]]
    name       = "Servicios"
    url        = "/servicios"
    weight     = 1
  [[menu.main]]
    name       = "Casos de Éxito"
    url        = "/blog"
    weight     = 2
  [[menu.main]]
    name       = "Contacto"
    url        = "/contacto"
    weight     = 3

[taxonomies]
  category = "categorias"
  tag      = "etiquetas"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "github-dark"
