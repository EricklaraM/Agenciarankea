<header class="navbar" role="banner">
  <nav class="container navbar__inner" aria-label="Navegación principal">

    <!-- Logo -->
    <a href="/" class="navbar__logo" aria-label="Agencia Rankea - Inicio">
      <svg width="24" height="24" viewBox="0 0 26 26" fill="none" aria-hidden="true"><rect x="1" y="16" width="5" height="9" rx="1.5" fill="#4130E8"/><rect x="8" y="11" width="5" height="14" rx="1.5" fill="#4130E8"/><rect x="15" y="6" width="5" height="19" rx="1.5" fill="#4130E8"/><path d="M22.5 1 L26 6 H19 Z" fill="#FF4D2E"/><rect x="20" y="5.5" width="5" height="19.5" rx="1.5" fill="#FF4D2E"/></svg>
      Rankea
    </a>

    <!-- Desktop links -->
    <ul class="navbar__links" role="list">
      {{ range .Site.Menus.main }}
      <li>
        <a href="{{ .URL }}"
           {{ if eq $.RelPermalink .URL }}class="active" aria-current="page"{{ end }}>
          {{ .Name }}
        </a>
      </li>
      {{ end }}
    </ul>

    <!-- CTA -->
    <a href="{{ .Site.Params.ctaURL }}" class="btn btn--primary navbar__cta">
      {{ .Site.Params.ctaText }}
    </a>

    <!-- Mobile toggle -->
    <button class="navbar__toggle"
            aria-label="Abrir menú de navegación"
            aria-expanded="false"
            aria-controls="mobile-nav">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>
</header>

<!-- Mobile nav overlay -->
<nav id="mobile-nav" class="mobile-nav" aria-label="Menú móvil">
  {{ range .Site.Menus.main }}
  <a href="{{ .URL }}">{{ .Name }}</a>
  {{ end }}
  <a href="{{ .Site.Params.ctaURL }}" class="btn btn--primary btn--lg" style="margin-top:1rem">
    {{ .Site.Params.ctaText }}
  </a>
</nav>
